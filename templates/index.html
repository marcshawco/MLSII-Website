{% extends "base.html" %}
{% block content %}
<section class="hero-shell">
    <div class="hero-watermark" aria-hidden="true">MARC SHAW</div>

    <header class="hero-nav">
        <a class="hero-logo" href="{{ url_for('index') }}" aria-label="Home">
            <span></span>
        </a>

        <nav class="hero-nav-links" aria-label="Primary">
            <a href="{{ url_for('index') }}">Home</a>
            <a href="{{ url_for('portfolio') }}">Visuals</a>
            <a href="{{ url_for('essentials') }}">Audio</a>
            <a href="{{ url_for('enemies') }}">Enemies</a>
            <a href="{{ url_for('links') }}">Link In Bio</a>
            <a href="{{ url_for('privacy_policy') }}">Privacy Policy</a>
        </nav>

        <div class="hero-nav-spacer" aria-hidden="true"></div>
    </header>

    <div class="hero-main">
        <div class="hero-left">
            <h1 class="hero-title">
                <span class="hero-title-top">Marc</span>
                <span class="hero-title-bottom">Shaw</span>
            </h1>
            <p class="hero-subtitle">Creative Director &amp; Cloud Engineer</p>

            <a class="hero-feature-link" href="{{ url_for('essentials') }}">
                <span class="hero-feature-kicker">Audio</span>
                <span class="hero-feature-title">Marc Shaw Audio</span>
                <span class="hero-feature-meta">Apple Music</span>
            </a>
        </div>

        <div class="hero-right">
            <div class="hero-visual-stack">
                <div class="hero-portrait">
                    <img
                        src="{{ url_for('static', filename='images/hero-portrait.jpg') }}"
                        alt="Professional portrait"
                        width="800"
                        height="1200"
                        fetchpriority="high"
                        loading="eager"
                        decoding="async">
                </div>

                <a class="hero-playlist-card" href="{{ url_for('essentials') }}" aria-label="Open Marc Shaw Audio page">
                    <img
                        src="{{ url_for('static', filename='images/marc-shaw-essentials.png') }}"
                        alt="Marc Shaw Audio playlist artwork"
                        width="1024"
                        height="1024"
                        loading="lazy"
                        decoding="async">
                </a>
            </div>
        </div>
    </div>

</section>
{% endblock %}
